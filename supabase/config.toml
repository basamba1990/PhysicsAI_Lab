# Supabase Configuration for Physics AI Lab

[project]
project_id = "physics-ai-lab"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = "public"
max_rows = 1000

[db]
port = 5432
major_version = 15

[realtime]
enabled = true
max_bytes_per_second = 1048576
max_connections = 100
max_events_per_second = 1000

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://*.vercel.app"]
jwt_expiry = 3600
enable_signup = true
enable_email_autoconfirm = false

[storage]
file_size_limit = 52428800
s3_host = "localhost:9000"
s3_region = "us-east-1"
s3_access_key = "minioadmin"
s3_secret_key = "minioadmin"
s3_bucket = "physics-ai-lab"

[functions]
verify_jwt = true
import_map = "./functions/_shared/import_map.json"
